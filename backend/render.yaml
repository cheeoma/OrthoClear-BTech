services:
  - type: web
    name: orthoclear-backend
    runtime: python
    buildCommand: "apt-get install -y tesseract-ocr && pip install -r requirements.txt"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false